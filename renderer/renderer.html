<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float View Renderer</title>
    <style>
      html {
        background-color: black;
      }

      body {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      button {
        padding: 10px;
        font-size: 16px;
      }

      pre {
        border: 1px solid #555;
        color: white;
        height: 60vh;
        overflow-y: scroll;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileInput" accept=".csv" />
    <button onclick="main().catch(console.error)">render</button>
    <progress id="progress"></progress>
    <pre id="output"></pre>
    <script>
      /** @type {HTMLInputElement} */
      const fileInput = document.getElementById('fileInput');
      /** @type {HTMLPreElement} */
      const outputPre = document.getElementById('output');
      /** @type {HTMLProgressElement} */
      const progress = document.getElementById('progress');

      const worker = new Worker('/worker.js');
      let complete = false;
      worker.addEventListener('message', (e) => {
        if (e.data.type === 'log' && !complete) {
          outputPre.innerText += `LOG: ${e.data.message}\n`;
        }
        if (e.data.type === 'progress') {
          outputPre.innerText += `Rendered ${e.data.frameNumber} frames\n`;
        }
        if (e.data.type === 'complete') {
          complete = true;
          outputPre.innerText += `Complete!\n`;
        }

        outputPre.scrollTop = outputPre.scrollHeight;
      });

      async function main() {
        if (fileInput.files.length === 0) {
          alert('Please select a file to render.');
          return;
        }

        const outputFileHandle = await window.showSaveFilePicker({
          startIn: 'videos',
          suggestedName: 'myVideo.webm',
          types: [
            {
              description: 'Video File',
              accept: { 'video/webm': ['.webm'] },
            },
          ],
        });

        const canvas = document.createElement('canvas');
        const offscreen = canvas.transferControlToOffscreen();
        complete = false;
        worker.postMessage(
          {
            type: 'start',
            inputFile: fileInput.files[0],
            outputFileHandle,
            canvas: offscreen,
          },
          [offscreen],
        );

        while (!complete) {
          console.log('update');
          await new Promise((resolve) => setTimeout(resolve, 1000));
          worker.postMessage({ type: 'update' });
        }
      }
    </script>
  </body>
</html>
