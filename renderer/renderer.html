<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Float View Renderer</title>
    <style>
      html {
        background-color: black;
      }

      body {
        display: flex;
        flex-direction: column;
        gap: 20px;
      }

      button {
        padding: 10px;
        font-size: 16px;
      }

      pre {
        border: 1px solid #555;
        color: white;
        height: 60vh;
        overflow-y: scroll;
      }

      progress {
        width: 100%;
      }
    </style>
  </head>
  <body>
    <input type="file" id="fileInput" accept=".csv" />
    <button onclick="main().catch(console.error)">select output and render</button>
    <button onclick="stop()">cancel</button>
    <pre id="output"></pre>
    <progress value="0" max="1" id="progress"></progress>
    <script>
      /** @type {HTMLInputElement} */
      const fileInput = document.getElementById('fileInput');
      /** @type {HTMLPreElement} */
      const outputPre = document.getElementById('output');
      /** @type {HTMLProgressElement} */
      const progress = document.getElementById('progress');

      const worker = new Worker('/worker.js');
      let complete = false;
      worker.addEventListener('message', (e) => {
        if (e.data.type === 'fatal') {
          alert(`Fatal error: ${e.data.message}`);
          complete = true;
        }
        if (e.data.type === 'log' && !complete) {
          outputPre.innerText += `LOG: ${e.data.message}\n`;
        }
        if (e.data.type === 'progress' && !complete) {
          progress.max = e.data.totalFramesToGenerate;
          progress.value = e.data.totalFramesGenerated;
        }
        if (e.data.type === 'complete') {
          complete = true;
          progress.value = progress.max;
          outputPre.innerText += `Complete!\n`;
        }

        outputPre.scrollTop = outputPre.scrollHeight;
      });

      function stop() {
        worker.postMessage({ type: 'stop' });
        outputPre.innerText += `Cancelled!\n`;
        complete = true;
      }

      async function main() {
        if (fileInput.files.length === 0) {
          alert('Please select a file to render.');
          return;
        }

        const outputDirectoryHandle = await window.showDirectoryPicker({
          id: 'output',
          mode: 'readwrite',
          startIn: 'videos',
        });

        const canvas = document.createElement('canvas');
        const offscreen = canvas.transferControlToOffscreen();
        complete = false;
        worker.postMessage(
          {
            type: 'start',
            inputFile: fileInput.files[0],
            outputDirectoryHandle,
            canvas: offscreen,
          },
          [offscreen],
        );

        while (!complete) {
          await new Promise((resolve) => setTimeout(resolve, 500));
          worker.postMessage({ type: 'update' });
        }
      }
    </script>
  </body>
</html>
